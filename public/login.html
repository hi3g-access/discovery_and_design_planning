<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Requirement Analyzer</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center">
  <div class="bg-white rounded-lg shadow-lg p-8 w-full max-w-md">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-slate-800 mb-2">Requirement Analyzer</h1>
      <p class="text-slate-600 text-sm">Enter password to continue</p>
    </div>
    
    <form id="loginForm" class="space-y-4">
      <div>
        <label for="password" class="block text-sm font-medium text-slate-700 mb-2">
          Password
        </label>
        <input
          type="password"
          id="password"
          name="password"
          required
          class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-slate-400 focus:border-transparent"
          placeholder="Enter password"
        />
      </div>
      
      <div id="error" class="hidden bg-red-50 text-red-700 px-4 py-3 rounded-lg text-sm">
        Invalid password. Please try again.
      </div>
      
      <button
        type="submit"
        id="submitBtn"
        class="w-full bg-slate-800 text-white py-3 rounded-lg hover:bg-slate-700 transition-colors font-medium"
      >
        Sign In
      </button>
    </form>
    
    <div class="mt-6 text-center text-xs text-slate-500">
      Contact your administrator for access
    </div>
  </div>
  
  <script>
    const form = document.getElementById('loginForm');
    const passwordInput = document.getElementById('password');
    const errorDiv = document.getElementById('error');
    const submitBtn = document.getElementById('submitBtn');
    
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const password = passwordInput.value;
      errorDiv.classList.add('hidden');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in...';
      
      try {
        const response = await fetch('/api/auth', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ password }),
        });
        
        const data = await response.json();
        
        if (response.ok && data.success) {
          // Get return URL from query params or default to root
          const urlParams = new URLSearchParams(window.location.search);
          const returnTo = urlParams.get('returnTo') || '/';
          window.location.href = returnTo;
        } else {
          errorDiv.classList.remove('hidden');
          passwordInput.value = '';
          passwordInput.focus();
        }
      } catch (error) {
        console.error('Login error:', error);
        errorDiv.textContent = 'Connection error. Please try again.';
        errorDiv.classList.remove('hidden');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
